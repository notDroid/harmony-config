args:
  - -m
  - harmony.consumer.main
autoscaling:
  enabled: true
  maxReplicas: 20
  minReplicas: 1
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
command:
  - python
env:
  APP_ENV: development
  AWS__REGION: us-east-1
  CONSUMER_NAME: Harmony CDC Worker staging
  DYNAMODB__CHAT_HISTORY_TABLE_NAME: chat_history_staging
  DYNAMODB__URL: https://dynamodb.us-east-1.amazonaws.com:443
  FEATURES__CACHE_REDIS: "true"
  KAFKA_CONSUMER__BOOTSTRAP_SERVERS: automq-kafka:9092
  KAFKA_CONSUMER__FETCH_MAX_BYTES: "52428800"
  KAFKA_CONSUMER__GROUP_ID: staging_cdc_consumer
  KAFKA_CONSUMER__MAX_POLL_RECORDS: "1000"
  KAFKA_CONSUMER__POLL_TIMEOUT_MS: "1000"
  KAFKA_CONSUMER__SESSION_TIMEOUT_MS: "10000"
  POSTGRES__URL: postgresql+asyncpg://harmony:$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):5432/harmony
  REDIS__HEALTH_CHECK_INTERVAL: "30"
  REDIS__REQUEST_TIMEOUT_MS: "100"
  REDIS__URL: redis://$(REDIS_HOST):6379/1
  TOPICS__CHAT: staging_chat_events
  TOPICS__USER: staging_user_events
image:
  pullPolicy: Always
  repository: ghcr.io/notdroid/harmonychat
  tag: v1.0.3
podAnnotations:
  secret.reloader.stakater.com/reload: tf-outputs-secret
replicaCount: 1
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
secretEnv:
  - name: POSTGRES_HOST
    secretKey: rds_endpoint
    secretName: tf-outputs-secret
  - name: REDIS_HOST
    secretKey: redis_endpoint
    secretName: tf-outputs-secret
  - name: AWS__ACCESS_KEY_ID
    secretKey: access_key_id
    secretName: aws-auth-secret
  - name: AWS__SECRET_ACCESS_KEY
    secretKey: secret_access_key
    secretName: aws-auth-secret
  - name: POSTGRES_PASSWORD
    secretKey: postgres_password
    secretName: postgres-auth-secret
service:
  enabled: false
