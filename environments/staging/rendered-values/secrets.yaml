environment: remote
infra:
  aws:
    region: us-east-1
  centrifugo:
    allowed_origins:
      - '*'
    autoscaling:
      enabled: true
      maxReplicas: 10
      minReplicas: 1
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80
    chat:
      history_size: 100
      history_ttl: 3600s
      presence_enabled: true
    host: centrifugo
    port: 8000
    replicaCount: 1
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
  compute:
    cluster_name: harmony-staging-eks
    cluster_version: "1.35"
  conduit:
    autoscaling:
      enabled: true
      maxReplicas: 5
      minReplicas: 1
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80
    replicaCount: 1
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
  dynamodb:
    chat_history_table_name: chat_history_staging
    host: dynamodb.us-east-1.amazonaws.com
    port: 443
    scheme: https
  k8s:
    storage_class: gp3
  kafka:
    autoscaling:
      enabled: true
      maxReplicas: 10
      minReplicas: 1
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80
    broker_memory:
      heap_opts: -Xmx1g -Xms1g -XX:MaxDirectMemorySize=1536m -XX:MetaspaceSize=96m
      s3_block_cache_size: "536870912"
      s3_wal_cache_size: "536870912"
    broker_replica_count: 1
    broker_resources:
      limits:
        cpu: "1"
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 3Gi
    cluster_id: NjM1ZjYxNjYtNjM1Zi00YmU
    consumer_groups:
      cdc_worker: staging_cdc_consumer
      centrifugo_consumer: staging_centrifugo_consumer
      dynamodb_sink: staging_dynamodb_sink
    controller_memory:
      heap_opts: -Xmx1g -Xms1g -XX:MaxDirectMemorySize=1536m -XX:MetaspaceSize=96m
      s3_block_cache_size: "536870912"
      s3_wal_cache_size: "536870912"
    controller_replica_count: 3
    controller_resources:
      limits:
        cpu: "1"
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 3Gi
    host: automq-kafka
    port: 9092
    producer:
      retry_backoff_ms: 500
    storage_size: 2Gi
    topics:
      chat_events: staging_chat_events
      chat_messages: staging_chat_messages
      user_events: staging_user_events
  karpenter:
    limits:
      cpu: 1000
      memory: 1000Gi
  postgres:
    allocated_storage_gb: 20
    dbname: harmony
    instance_class: db.t4g.micro
    port: 5432
    sslmode: require
    user: harmony
  redis:
    db_index: 1
    health_check_interval: 30
    node_type: cache.t4g.micro
    port: 6379
    request_timeout_ms: 100
  redpanda_connect:
    autoscaling:
      enabled: true
      maxReplicas: 5
      minReplicas: 1
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80
    replicaCount: 1
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
  s3:
    buckets:
      automq_data: harmony-chat-automq-data-staging-638054608587
      automq_ops: harmony-chat-automq-ops-staging-638054608587
    endpoint: https://s3.us-east-1.amazonaws.com
    path_style: "false"
    region: us-east-1
  secrets:
    manager_name: harmony/staging/secrets
  vpc:
    azs_count: 3
    cidr: 10.0.0.0/16
