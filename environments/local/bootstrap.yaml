apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harmony-local-bootstrap
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/notDroid/HarmonyChat.git
    targetRevision: HEAD
    path: infra/k8s/appsets/local
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
