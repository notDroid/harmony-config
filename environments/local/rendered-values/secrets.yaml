environment: local
infra:
  aws:
    region: us-east-1
  centrifugo:
    allowed_origins:
      - '*'
    autoscaling:
      enabled: false
      maxReplicas: 10
      minReplicas: 1
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80
    chat:
      history_size: 100
      history_ttl: 3600s
      presence_enabled: true
    host: centrifugo
    port: 8000
    replicaCount: 1
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
  conduit:
    autoscaling:
      enabled: false
      maxReplicas: 5
      minReplicas: 1
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80
    replicaCount: 1
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
  dynamodb:
    chat_history_table_name: local_harmony_chat_history
    host: dynamodb
    port: 8000
    scheme: http
  k8s:
    storage_class: standard
  kafka:
    autoscaling:
      enabled: false
      maxReplicas: 10
      minReplicas: 1
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80
    broker_memory:
      heap_opts: -Xmx1g -Xms1g -XX:MaxDirectMemorySize=1536m -XX:MetaspaceSize=96m
      s3_block_cache_size: "536870912"
      s3_wal_cache_size: "536870912"
    broker_replica_count: 1
    broker_resources:
      limits:
        cpu: "1"
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 3Gi
    cluster_id: NjM1ZjYxNjYtNjM1Zi00YmU
    consumer_groups:
      cdc_worker: local_cdc_consumer
      centrifugo_consumer: local_centrifugo_consumer
      dynamodb_sink: local_dynamodb_sink
    controller_memory:
      heap_opts: -Xmx1g -Xms1g -XX:MaxDirectMemorySize=1536m -XX:MetaspaceSize=96m
      s3_block_cache_size: "536870912"
      s3_wal_cache_size: "536870912"
    controller_replica_count: 1
    controller_resources:
      limits:
        cpu: "1"
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 3Gi
    host: automq-kafka
    port: 9092
    producer:
      retry_backoff_ms: 500
    storage_size: 2Gi
    topics:
      chat_events: local_chat_events
      chat_messages: local_chat_messages
      user_events: local_user_events
  local:
    dynamodbInitImage: init-dynamodb:latest
  postgres:
    dbname: harmony
    host: postgres
    port: 5432
    sslmode: disable
    user: harmony
  redis:
    db_index: 1
    health_check_interval: 30
    host: redis-master
    port: 6379
    request_timeout_ms: 100
  redpanda_connect:
    autoscaling:
      enabled: false
      maxReplicas: 5
      minReplicas: 1
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80
    replicaCount: 1
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
  s3:
    buckets:
      automq_data: automq-data-local
      automq_ops: automq-ops-local
    endpoint: http://minio:9000
    path_style: "true"
    region: us-east-1
secrets:
  app:
    secret_key: f268866c4f85ffd486561f38c9f1fe29bbbd770dd1f450e1943847501088c24e
  aws:
    access_key_id: test1234
    secret_access_key: test1234
