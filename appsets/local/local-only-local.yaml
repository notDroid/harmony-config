apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: harmony-local-only-local
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: dynamodb-local
            wave: "-2"
            chartPath: infra/k8s/charts/dynamodb-local
            namespace: harmony

          - name: init-job
            wave: "0"
            chartPath: infra/k8s/charts/init-job
            namespace: harmony

  template:
    metadata:
      name: "local-{{ .name }}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{ .wave }}"
    spec:
      project: default
      source:
        repoURL: https://github.com/notDroid/HarmonyChat.git
        targetRevision: HEAD
        path: "{{ .chartPath }}"
        helm:
          releaseName: "{{ .name }}"
          valueFiles:
            - $values/infra/environments/local/rendered-values/local/{{ .name }}.yaml

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"

      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        automated:
          prune: true
          selfHeal: true
