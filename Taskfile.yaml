version: '3'

dotenv: ['.env']

env:
  SOPS_AGE_KEY_FILE: "{{.ROOT_DIR}}/keys.txt"

vars:
  REPO_URL: "https://github.com/notDroid/HarmonyChat.git"
  VERSION:
    sh: "yq '.version' config.yaml"

  K8S_CACHE_DIR: .cache/
  K8S_ENV: '{{.K8S_ENV | default "local"}}' # IMPORTANT: set through .env or CLI flag
  CONFIG_HELMFILE_VALUES: >-
    --state-values-file ../../environments/{{.K8S_ENV}}/values.yaml
    --state-values-file ../../environments/{{.K8S_ENV}}/secrets.yaml
  HELMFILE_ENV: '{{if eq .K8S_ENV "local"}}local{{else}}remote{{end}}'
  HELMFILE_CMD: "helmfile -e {{.HELMFILE_ENV}} {{.CONFIG_HELMFILE_VALUES}} --skip-deps"

tasks:
  default:
    silent: true
    cmds: [task --list-all]

  clean:
    desc: "🧹 Clean dist and cache directories"
    cmds: [rm -rf dist/ .cache/]

  # --------------------------------------------------------------------------
  # 1. SECRETS
  # --------------------------------------------------------------------------

  secrets:setup:
    desc: "🔑 SECRETS: Configure .sops.yaml with new age key"
    cmds:
      - uv run scripts/setup_sops.py

  secrets:generate:
    desc: "🔐 SECRETS: Generate a new secrets.yaml file for the target K8S_ENV"
    cmds:
      - uv run scripts/generate_secrets.py {{.K8S_ENV}}

  secrets:encrypt:
    desc: "🔒 SOPS: Encrypt secrets.yaml in place"
    cmds:
      - sops -e -i environments/{{.K8S_ENV}}/secrets.yaml

  secrets:decrypt:
    desc: "🔓 SOPS: Decrypt secrets.yaml in place"
    cmds:
      - sops -d -i environments/{{.K8S_ENV}}/secrets.yaml

  # --------------------------------------------------------------------------
  # 2. INFRASTRUCTURE
  # --------------------------------------------------------------------------

  infra:fetch:
    desc: "🚚 INFRA: Fetch k8s templates from app-repo"
    cmds:
      - uv run scripts/fetch-k8s.py "{{.REPO_URL}}@{{.VERSION}}" --cache-dir "{{.K8S_CACHE_DIR}}k8s" ${LOCAL_INFRA_PATH:+--local-path "$LOCAL_INFRA_PATH"}

  infra:render:
    desc: "📄 INFRA: Render environment .gotmpl files to rendered-values/"
    dir: .cache/k8s
    cmds:
      - mkdir -p ../../environments/{{.K8S_ENV}}/rendered-values
      - "helmfile -e {{.HELMFILE_ENV}} {{.CONFIG_HELMFILE_VALUES}} --skip-deps write-values --output-file-template='../../environments/{{.K8S_ENV}}/rendered-values/{{`{{.Release.Name}}`}}.yaml'"

  # --------------------------------------------------------------------------
  # 3. ARGOCD
  # --------------------------------------------------------------------------

  argocd:install:
    desc: "🐙 ARGOCD: Install ArgoCD"
    cmds:
      - kubectl create namespace argocd || true
      - kubectl apply -n argocd --server-side --force-conflicts -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
      - kubectl rollout status deployment argocd-applicationset-controller -n argocd --timeout=120s
      - kubectl patch configmap argocd-cmd-params-cm -n argocd --type merge -p '{"data":{"applicationsetcontroller.enable.progressive.syncs":"true"}}'
      - kubectl rollout restart deployment argocd-applicationset-controller -n argocd
      - kubectl rollout status deployment argocd-applicationset-controller -n argocd --timeout=120s

  argocd:bootstrap:
    desc: "🐙 ARGOCD: Apply local bootstrap Application"
    cmds:
      - kubectl apply -f environments/local/bootstrap.yaml

  # For now we can use app-repo tasks to do the first half then run the second half here
  # kind:argocd:setup:
  #   desc: "🚀 K8S: setup cluster + build + argocd install + bootstrap"
  #   cmds:
  #     - task: kind:cluster:create
  #     - task: image:load:kind
  #     - task: argocd:install
  #     - task: argocd:bootstrap

  argocd:ui:
    desc: Port-forward ArgoCD UI to localhost:8080
    cmds:
      - kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d; echo
      - kubectl port-forward svc/argocd-server -n argocd 8080:443

  # --------------------------------------------------------------------------
  # 4. Terraform
  # --------------------------------------------------------------------------

  tf:init:
    desc: "🌍 TF: Initialize Terragrunt for the target K8S_ENV"
    dir: infra/terraform/environments/{{.K8S_ENV}}
    cmds:
      - terragrunt init

  tf:plan:
    desc: "🌍 TF: Plan Terragrunt infrastructure for the target K8S_ENV"
    dir: infra/terraform/environments/{{.K8S_ENV}}
    cmds:
      - terragrunt plan

  tf:apply:
    desc: "🌍 TF: Apply Terragrunt infrastructure for the target K8S_ENV"
    dir: infra/terraform/environments/{{.K8S_ENV}}
    cmds:
      - terragrunt apply
  
  tf:destroy:
    desc: "🌍 TF: Destroy Terragrunt infrastructure for the target K8S_ENV"
    dir: infra/terraform/environments/{{.K8S_ENV}}
    cmds:
      - terragrunt destroy