version: '3'

dotenv: ['.env']

vars:
  PROJECT_NAME:
    sh: "yq '.project.name' config.yaml"
  INFRA_REPO_URL:
    sh: "yq '.project.repo_url' config.yaml"
  INFRA_VERSION:
    sh: "yq '.infra.version' config.yaml"
  REGISTRY_URL:
    sh: "yq '.registry.url' config.yaml"
  LOCAL_REGISTRY_URL:
    sh: "yq '.registry.local_url' config.yaml"
  
  K8S_ENV: '{{.K8S_ENV | default "local"}}'
  INFRA_CACHE_DIR: .cache/infra
  MANIFEST_OUTPUT_DIR: dist/{{.K8S_ENV}}-manifests
  
  REGISTRY_BASE: '{{if eq .K8S_ENV "local"}}{{.LOCAL_REGISTRY_URL}}{{else}}{{.REGISTRY_URL}}{{end}}'
  CHART_NAME: '{{.PROJECT_NAME}}-manifests-{{.K8S_ENV}}'
  CHART_VERSION: '{{.CHART_VERSION | default "0.1.4"}}'
  
  HELMFILE_ENV: '{{if eq .K8S_ENV "local"}}local{{else}}remote{{end}}'
  HELMFILE_VALUES: >-
    {{if eq .K8S_ENV "local"}}
    --state-values-file ../../../environments/local/values.yaml
    --state-values-file ../../../environments/local/secrets.yaml
    {{else}}
    --state-values-file ../../../environments/{{.K8S_ENV}}/expanded-values.yaml.gotmpl
    --state-values-file environments/{{.HELMFILE_ENV}}/values-override.yaml.gotmpl
    {{end}}

tasks:
  default:
    silent: true
    cmds: [task --list-all]

  setup:
    desc: "🔧 Setup local developer environment"
    cmds:
      - |
        if [ ! -f .env ]; then
          cp .env.example .env
          echo "✅ Created .env from .env.example"
        else
          echo "ℹ️  .env already exists, skipping."
        fi

  clean:
    desc: "🧹 Clean dist and cache directories"
    cmds: [rm -rf dist/ .cache/]

  # ==========================================
  # ===          LOCAL E2E TASKS           ===
  # ==========================================

  local:up:
    desc: "☸️  Full Local E2E: Cluster + ArgoCD + OCI + Deploy"
    cmds:
      - task setup
      - task local:cluster
      - task local:argocd
      - cd ../app-repo && task kind:load
      - task infra:publish
      - task local:deploy
      - echo "Waiting for ArgoCD health..."
      - sleep 10
      - kubectl wait --for=jsonpath='{.status.health.status}'=Healthy --timeout=300s application/{{.PROJECT_NAME}}-{{.K8S_ENV}} -n argocd
      - echo "✅ E2E Success!"

  local:cluster:
    desc: "☸️  Create local cluster"
    cmds: ["kind create cluster --config environments/local/kind-config.yaml --name {{.PROJECT_NAME}}"]
    status: ["kind get clusters | grep {{.PROJECT_NAME}}"]

  local:argocd:
    desc: "🐙 Install ArgoCD and Namespaces"
    cmds:
      - kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml --server-side --force-conflicts
      - kubectl wait --for=condition=Available deployment/argocd-server -n argocd --timeout=300s
      - |
        for ns in harmony monitoring; do
          kubectl create namespace $ns --dry-run=client -o yaml | kubectl apply -f -
        done

  local:deploy:
    desc: "🐙 Apply ArgoCD Application"
    env:
      PROJECT_NAME: '{{.PROJECT_NAME}}'
      K8S_ENV: '{{.K8S_ENV}}'
      REGISTRY_BASE: '{{.REGISTRY_BASE}}'
      CHART_NAME: '{{.CHART_NAME}}'
      CHART_VERSION: '{{.CHART_VERSION}}'
    cmds:
      - envsubst < environments/local/argocd/application.yaml | kubectl apply -n argocd -f -

  # ==========================================
  # ===     INFRASTRUCTURE / OCI TASKS     ===
  # ==========================================

  infra:fetch:
    desc: "⬇️ Fetch agnostic infra components"
    cmds: 
      - ./scripts/fetch-infra.sh "{{.INFRA_VERSION}}" "{{.INFRA_CACHE_DIR}}" "{{.INFRA_REPO_URL}}"

  infra:template:
    desc: "📄 Template Helmfile to standard manifests"
    deps: [infra:fetch]
    cmds:
      - rm -rf {{.MANIFEST_OUTPUT_DIR}}
      - mkdir -p {{.MANIFEST_OUTPUT_DIR}}
      - |
        cd {{.INFRA_CACHE_DIR}}/k8s && \
        helmfile --environment {{.HELMFILE_ENV}} {{.HELMFILE_VALUES}} \
                 template --include-crds --output-dir ../../../{{.MANIFEST_OUTPUT_DIR}}

  infra:publish:
    desc: "📦 Package and push OCI artifact"
    deps: [infra:template]
    cmds: 
      - ./scripts/package-oci.sh "{{.MANIFEST_OUTPUT_DIR}}" "{{.CHART_NAME}}" "{{.CHART_VERSION}}" "{{.REGISTRY_BASE}}"