version: '3'

vars:
  INFRA_CACHE_DIR: .cache/infra
  MANIFEST_OUTPUT: dist/manifests.yaml
  REGISTRY_URL: '{{.REGISTRY_URL | default "oci://ghcr.io/notdroid"}}'
  CHART_VERSION: '{{.CHART_VERSION | default "0.1.0"}}'
  K8S_ENV: '{{.K8S_ENV | default "local"}}'
  HELMFILE_ENV: '{{if eq .K8S_ENV "local"}}local{{else}}remote{{end}}'

tasks:
  fetch-infra:
    desc: "⬇️ Fetch the agnostic infra components from GitHub release"
    cmds:
      - mkdir -p .cache
      - curl -sL https://github.com/notDroid/HarmonyChat/archive/refs/tags/v1.0.5.tar.gz | tar xz -C .cache
      - rm -rf {{.INFRA_CACHE_DIR}}
      - mv .cache/HarmonyChat-1.0.5/infra {{.INFRA_CACHE_DIR}}
      - rm -rf .cache/HarmonyChat-1.0.5
    status:
      - test -d {{.INFRA_CACHE_DIR}}

  template:
    desc: "📄 Template Helmfile to standard Kubernetes manifests"
    deps: [fetch-infra]
    cmds:
      - mkdir -p dist
      # Run helmfile template from the config-repo root, but we need to tell helmfile where its root is
      # or run it from the cache directory and pass absolute paths.
      # The helmfile expects to be in infra/k8s so it can find environments/base/...
      # We'll run it from inside the cached infra/k8s dir and pass the values files from our config-repo.
      - |
        cd {{.INFRA_CACHE_DIR}}/k8s && \
        helmfile --environment {{.HELMFILE_ENV}} \
                 --state-values-file ../../../environments/{{.K8S_ENV}}/values.yaml \
                 --state-values-file ../../../environments/{{.K8S_ENV}}/secrets.yaml \
                 template --include-crds > ../../../{{.MANIFEST_OUTPUT}}
    sources:
      - environments/{{.K8S_ENV}}/**/*
    generates:
      - "{{.MANIFEST_OUTPUT}}"

  publish:
    desc: "📦 Package and push rendered manifests as an OCI Helm Chart"
    deps: [template]
    cmds:
      - mkdir -p dist/harmony-manifests/templates
      - |
        python3 -c "
        import sys
        with open('{{.MANIFEST_OUTPUT}}', 'r') as f:
            chunks = f.read().split('\n---\n')
            for i, chunk in enumerate(chunks):
                with open(f'dist/harmony-manifests/templates/manifest-{i}.yaml', 'w') as out:
                    out.write(chunk)
        "
      - |
        cat <<EOF > dist/harmony-manifests/Chart.yaml
        apiVersion: v2
        name: harmony-manifests
        version: {{.CHART_VERSION}}
        description: Rendered manifests for HarmonyChat (Env {{.K8S_ENV}})
        EOF
      - helm package dist/harmony-manifests -d dist/
      - echo "Pushing Helm chart to {{.REGISTRY_URL}}"
      - helm push dist/harmony-manifests-{{.CHART_VERSION}}.tgz {{.REGISTRY_URL}}
