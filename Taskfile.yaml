version: '3'

dotenv: ['.env']

env:
  SOPS_AGE_KEY_FILE: "{{.ROOT_DIR}}/keys.txt"

vars:
  PROJECT_NAME:
    sh: "yq '.project.name' config.yaml"
  K8S_REPO_URL:
    sh: "yq '.project.repo_url' config.yaml"
  K8S_VERSION:
    sh: "yq '.k8s.version' config.yaml"
  REGISTRY_URL:
    sh: "yq '.registry.url' config.yaml"
  LOCAL_REGISTRY_URL:
    sh: "yq '.registry.local_url' config.yaml"
  
  K8S_ENV: '{{.K8S_ENV | default "local"}}'
  K8S_CACHE_DIR: .cache/k8s
  MANIFEST_OUTPUT_DIR: dist/{{.K8S_ENV}}-manifests
  
  REGISTRY_BASE: '{{if eq .K8S_ENV "local"}}{{.LOCAL_REGISTRY_URL}}{{else}}{{.REGISTRY_URL}}{{end}}'
  CHART_NAME: '{{.PROJECT_NAME}}-manifests-{{.K8S_ENV}}'
  CHART_VERSION: '{{.CHART_VERSION | default "0.0.0-local"}}'
  TARGET_REVISION: '{{.TARGET_REVISION | default ">=0.0.0-0"}}'
  
  HELMFILE_ENV: '{{if eq .K8S_ENV "local"}}local{{else}}remote{{end}}'
  CONFIG_HELMFILE_VALUES: >-
    {{if eq .K8S_ENV "local"}}
    --state-values-file ../../environments/local/values.yaml
    --state-values-file ../../environments/local/secrets.yaml
    {{else}}
    --state-values-file ../../environments/{{.K8S_ENV}}/expanded-values.yaml.gotmpl
    {{end}}

tasks:
  default:
    silent: true
    cmds: [task --list-all]

  clean:
    desc: "🧹 Clean dist and cache directories"
    cmds: [rm -rf dist/ .cache/]

  # --------------------------------------------------------------------------
  # 1. SECRETS
  # --------------------------------------------------------------------------

  secrets:setup:
    desc: "🔑 SECRETS: Configure .sops.yaml with new age key"
    cmds:
      - uv run scripts/setup_sops.py

  secrets:generate:
    desc: "🔐 SECRETS: Generate a new secrets.yaml file for the target K8S_ENV"
    cmds:
      - uv run scripts/generate_secrets.py {{.K8S_ENV}}

  secrets:encrypt:
    desc: "🔒 SOPS: Encrypt secrets.yaml in place"
    cmds:
      - sops -e -i environments/{{.K8S_ENV}}/secrets.yaml

  secrets:decrypt:
    desc: "🔓 SOPS: Decrypt secrets.yaml in place"
    cmds:
      - sops -d -i environments/{{.K8S_ENV}}/secrets.yaml

  # --------------------------------------------------------------------------
  # 2. LOCAL DEV
  # --------------------------------------------------------------------------

  kind:create:
    desc: "☸️  Create local cluster"
    cmds: ["kind create cluster --config environments/{{.K8S_ENV}}/kind-config.yaml --name {{.PROJECT_NAME}}"]
    status: ["kind get clusters | grep {{.PROJECT_NAME}}"]

  argocd:install:
    desc: "🐙 Install ArgoCD and Namespaces"
    cmds:
      - kubectl create namespace argocd
      - kubectl apply -n argocd --server-side --force-conflicts -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

  argocd:deploy:
    desc: "🐙 Apply ArgoCD Application"
    env:
      PROJECT_NAME: '{{.PROJECT_NAME}}'
      K8S_ENV: '{{.K8S_ENV}}'
      REGISTRY_BASE: '{{.REGISTRY_BASE}}'
      CHART_NAME: '{{.CHART_NAME}}'
      CHART_VERSION: '{{.CHART_VERSION}}'
    cmds:
      - envsubst < environments/{{.K8S_ENV}}/argocd/application.yaml.tmpl | kubectl apply -n argocd -f -

  argocd:repo:creds:
    desc: "🐙 Configure ArgoCD with ghcr.io credentials using the gh CLI"
    cmds:
      - |
        GITHUB_USERNAME=$(gh api user -q ".login" | tr '[:upper:]' '[:lower:]')
        GITHUB_TOKEN=$(gh auth token)
        export GITHUB_USERNAME
        export GITHUB_TOKEN
        envsubst < environments/{{.K8S_ENV}}/argocd/ghcr-creds.yaml.tmpl | kubectl apply -n argocd -f -

  kind:destroy:
    desc: "🧨 Destroy local cluster"
    cmds:
      - kind delete cluster --name {{.PROJECT_NAME}}

  # --------------------------------------------------------------------------
  # 3. INFRA
  # --------------------------------------------------------------------------

  infra:fetch:
    desc: "⬇️ Fetch agnostic k8s components"
    env:
      LOCAL_INFRA_PATH: '{{.LOCAL_INFRA_PATH}}'
    cmds: 
      - uv run scripts/fetch-k8s.py "{{.K8S_VERSION}}" "{{.K8S_CACHE_DIR}}" "{{.K8S_REPO_URL}}"

  infra:template:
    desc: "📄 Template Helmfile to standard manifests"
    deps: [infra:fetch]
    cmds:
      - rm -rf {{.MANIFEST_OUTPUT_DIR}}
      - mkdir -p {{.MANIFEST_OUTPUT_DIR}}
      - |
        cd {{.K8S_CACHE_DIR}} && \
        helmfile --environment {{.HELMFILE_ENV}} {{.CONFIG_HELMFILE_VALUES}} \
                 template --include-crds --output-dir ../../{{.MANIFEST_OUTPUT_DIR}}
      - |
        cd {{.K8S_CACHE_DIR}} && \
        helmfile --environment {{.HELMFILE_ENV}} {{.CONFIG_HELMFILE_VALUES}} \
                 list --output json > ../../{{.MANIFEST_OUTPUT_DIR}}/releases.json
      - uv run scripts/inject_waves.py "{{.MANIFEST_OUTPUT_DIR}}"

  infra:publish:
    desc: "📦 Package and push OCI artifact"
    deps: [infra:template]
    cmds: 
      - uv run scripts/package-oci.py "{{.MANIFEST_OUTPUT_DIR}}" "{{.CHART_NAME}}" "{{.CHART_VERSION}}" "{{.REGISTRY_BASE}}"